<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenBooks – Đăng nhập hệ thống</title>
  <meta name="description" content="Đăng nhập vào BenBooks bằng mã xác thực SMS để truy cập thư viện sách VIP bản quyền.">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- BenBooks CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">

  <!-- HEADER -->
  <div id="app-header"></div>

  <!-- LOGIN FORM -->
  <div class="login-section">
    <div class="login-card">
      <h4>Đăng nhập hệ thống</h4>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-telephone"></i></span>
          <input type="text" class="form-control" id="loginPhone" value="+84944640034" readonly>
        </div>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
          <input type="text" class="form-control" id="loginCode" placeholder="Nhập mã xác thực từ SMS">
          <span class="input-group-text" style="cursor:pointer;" onclick="pasteLoginCode()" title="Dán mã từ clipboard"><i class="bi bi-clipboard"></i></span>
        </div>
        <button type="submit" class="btn btn-brand btn-login" id="btnLogin">ĐĂNG NHẬP</button>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="app-footer"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
