<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenBooks – Chi tiết sách</title>
  <meta name="description" content="Xem chi tiết sách trên BenBooks – Nền tảng đọc sách bản quyền dành cho hội viên VIP.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="book-detail">

  <div id="app-header"></div>

  <main class="container-fluid bb-container py-4">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-3">
        <li class="breadcrumb-item"><a href="index.html"><i class="bi bi-house-door"></i> Trang chủ</a></li>
        <li class="breadcrumb-item"><a href="index.html">Ebook</a></li>
        <li class="breadcrumb-item active text-brand" id="breadcrumbTitle">Chi tiết sách</li>
      </ol>
    </nav>

    <!-- ══════ HERO: Cover + Info (full width, no sidebar) ══════ -->
    <div class="book-detail-hero">
      <div class="row g-0">
        <div class="col-md-6">
          <div class="detail-cover-wrap" id="detailCover"><!-- JS --></div>
          <div class="detail-thumbs-row" id="detailThumbs"><!-- JS --></div>
        </div>
        <div class="col-md-6">
          <div class="detail-info-col" id="detailInfo"><!-- JS --></div>
        </div>
      </div>
    </div>

    <!-- ══════ 2-COL LAYOUT: Main (left) + Sidebar (right) ══════ -->
    <div class="row">
      <!-- MAIN LEFT -->
      <div class="col-lg-9 col-md-8">

        <!-- Author + Publisher -->
        <div class="detail-author-pub" id="authorSection"><!-- JS --></div>

        <!-- Publishing Info -->
        <div class="detail-pub-info" id="publishingInfo"><!-- JS --></div>

        <!-- Tabs: Giới thiệu / Mục lục -->
        <div class="detail-tabs-card">
          <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tabIntro">GIỚI THIỆU</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tabToc">Mục lục</a></li>
          </ul>
          <div class="tab-content">
            <div class="tab-pane fade show active" id="tabIntro">
              <div id="detailDescription" style="max-height:280px;overflow:hidden;position:relative;"></div>
              <div class="text-center mt-3">
                <a href="#" class="see-more-link" onclick="toggleDescription(event)"><i class="bi bi-chevron-down me-1"></i>Xem đầy đủ</a>
              </div>
            </div>
            <div class="tab-pane fade" id="tabToc">
              <ul class="list-group list-group-flush" id="detailToc"></ul>
            </div>
          </div>
        </div>

        <!-- Comments -->
        <div class="detail-comments-card" id="commentsSection">
          <div class="comments-heading">BÌNH LUẬN</div>
          <div id="commentsList"><!-- JS --></div>
          <div class="comment-form mt-3">
            <textarea class="form-control" rows="3" placeholder="Mời Bạn để lại bình luận..."></textarea>
            <div class="text-center mt-3">
              <button type="button" class="btn btn-yellow btn-sm px-4" onclick="submitComment(this)">Gửi bình luận</button>
            </div>
          </div>
        </div>

        <!-- Sách cùng chủ đề -->
        <div class="related-books-section">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <div class="section-title mb-0">SÁCH CÙNG CHỦ ĐỀ</div>
            <div class="scroll-nav">
              <button type="button" class="scroll-btn" onclick="scrollSection('relatedBooksGrid',-1)"><i class="bi bi-chevron-left"></i></button>
              <button type="button" class="scroll-btn" onclick="scrollSection('relatedBooksGrid',1)"><i class="bi bi-chevron-right"></i></button>
            </div>
          </div>
          <div id="relatedBooksGrid"></div>
        </div>

      </div>

      <!-- SIDEBAR RIGHT -->
      <div class="col-lg-3 col-md-4">
        <div class="vip-info-box" id="vipInfoBox"><!-- JS --></div>
        <div class="bb-sidebar mb-3" id="sidebarDetail"></div>
        <div class="bb-sidebar" id="sidebarTopics"></div>
      </div>
    </div>
  </main>

  <!-- GỢI Ý CHO BẠN — full width -->
  <section class="suggested-section">
    <div class="container-fluid bb-container">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="section-title mb-0">GỢI Ý CHO BẠN</div>
        <div class="scroll-nav">
          <button type="button" class="scroll-btn" onclick="scrollSection('suggestedBooksGrid',-1)"><i class="bi bi-chevron-left"></i></button>
          <button type="button" class="scroll-btn" onclick="scrollSection('suggestedBooksGrid',1)"><i class="bi bi-chevron-right"></i></button>
        </div>
      </div>
      <div id="suggestedBooksGrid"></div>
    </div>
  </section>

  <div id="app-footer"></div>

  <!-- Floating buttons -->
  <div class="float-buttons">
    <a href="#" class="float-btn float-btn-messenger" title="Chat Messenger"><img src="assets/img/Messenger.svg" alt="Messenger"></a>
    <a href="#" class="float-btn float-btn-zalo" title="Chat Zalo"><img src="assets/img/zalo.svg" alt="Zalo"></a>
    <button type="button" class="float-btn float-btn-scroll-top" id="scrollTopBtn" title="Lên đầu trang" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="bi bi-chevron-up"></i></button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
