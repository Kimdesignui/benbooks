<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenBooks – Trang Đọc Sách VIP Cá Nhân</title>
  <meta name="description" content="Nền tảng đọc sách bản quyền dành cho hội viên VIP. Khám phá hàng nghìn đầu sách Ebook và Audiobook chất lượng cao.">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Roboto:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- BenBooks CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="homepage">

  <!-- HEADER -->
  <div id="app-header"></div>

  <!-- MAIN CONTENT -->
  <main class="container-fluid bb-container py-4">
    <div class="row">

      <!-- Sidebar -->
      <div class="col-lg-3 col-md-4">
        <div class="bb-sidebar mb-3" id="sidebarHomepage">
          <!-- Rendered by JS -->
        </div>
      </div>

      <!-- Main Content -->
      <div class="col-lg-9 col-md-8">
        <!-- Banner -->
        <div class="bb-banner">
          <img src="assets/img/banner-welcome.jpg" alt="Chào mừng đến với tủ sách Benbooks dành cho hội viên">
        </div>

        <!-- Section Title -->
        <div class="d-flex align-items-center justify-content-between flex-wrap mb-3">
          <h5 class="text-h5-18-b mb-0">TẤT CẢ SÁCH (<span id="bookCount">0</span>)</h5>
        </div>

        <!-- Filter Bar -->
        <div class="bb-filter-bar">
          <div class="bb-filter-tabs">
            <button class="btn btn-filter-active btn-sm" onclick="filterBooksHomepage('all', this)"><i class="bi bi-grid-3x3-gap me-1"></i> Tất cả</button>
            <button class="btn btn-filter btn-sm" onclick="filterBooksHomepage('Ebook', this)"><i class="bi bi-book me-1"></i> Ebook</button>
            <button class="btn btn-filter btn-sm" onclick="filterBooksHomepage('Audio', this)"><i class="bi bi-headphones me-1"></i> Audio</button>
          </div>
          <div class="bb-sort-bar d-none d-md-flex align-items-center gap-1">
            <span class="text-hidden">Sắp xếp theo:</span>
            <a href="#" class="active">Bán chạy</a>
            <a href="#">Phổ biến</a>
            <a href="#">Mới nhất</a>
            <a href="#">Theo giá</a>
          </div>
        </div>

        <!-- Book Grid -->
        <div class="row g-3" id="bookGrid">
          <!-- Rendered by JS -->
        </div>

        <!-- Pagination -->
        <nav class="mt-4 d-flex justify-content-center">
          <ul class="pagination bb-pagination" id="paginationNav">
            <!-- Rendered by JS -->
          </ul>
        </nav>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <div id="app-footer"></div>

  <!-- Zalo float -->
  <div class="zalo-float" title="Chat Zalo">Zalo</div>


  <!-- ═══════════════════════════════════════════════════
       MODALS
       ═══════════════════════════════════════════════════ -->

  <!-- Modal Kích hoạt -->
  <div class="modal fade modal-activate" id="modalActivate" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body position-relative">
          <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Đóng"></button>
          <h5>Truy cập vào Benbook Data</h5>
          <button class="btn btn-brand btn-lg px-5" id="btnActivate" onclick="window.location.href='login.html'">KÍCH HOẠT TÀI KHOẢN</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Chào mừng -->
  <div class="modal fade modal-welcome" id="modalWelcome" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body position-relative">
          <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Đóng"></button>
          <div class="vip-icon-circle">V</div>
          <div class="welcome-text">Chào mừng đến với gói đọc Benbooks<br>dành cho hội viên</div>
          <div class="time-remaining mb-3">
            Thời Gian Còn Lại: <span class="days">31 Ngày</span>
          </div>
          <button class="btn btn-brand btn-lg px-5" onclick="closeWelcomeModal()">VÀO ĐỌC SÁCH</button>
        </div>
      </div>
    </div>
  </div>


  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
